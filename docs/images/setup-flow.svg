<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <style>
    .card { fill: #0d6efd; }
    .card2 { fill: #6f42c1; }
    .card3 { fill: #d63384; }
    .card4 { fill: #198754; }
    .num { fill: #ffffff; font-size: 13px; font-weight: 700; }
    .title { fill: #ffffff; font-size: 15px; font-weight: 700; }
    .desc { fill: #eef1f4; font-size: 11.5px; }
    .arrow { fill: none; stroke: #9aa0a6; stroke-width: 2.5; }
    .arrowhead { fill: #9aa0a6; }
    .caption { fill: #6b7280; font-size: 12px; font-weight: 600; }
  </style>

  <text x="10" y="24" class="caption">SETUP — from a fresh laptop to sending, in 4 steps</text>

  <!-- Step 1 -->
  <rect x="10" y="44" width="200" height="120" rx="12" class="card"/>
  <circle cx="34" cy="70" r="12" fill="#ffffff" opacity="0.25"/>
  <text x="34" y="75" text-anchor="middle" class="num">1</text>
  <text x="26" y="108" class="title">Run ./run.sh</text>
  <text x="26" y="130" class="desc">Checks Go &amp; Node,</text>
  <text x="26" y="146" class="desc">installs everything,</text>
  <text x="26" y="162" class="desc">creates config files.</text>

  <!-- arrow -->
  <path class="arrow" d="M216 104 H236"/>
  <polygon class="arrowhead" points="236,98 248,104 236,110"/>

  <!-- Step 2 -->
  <rect x="250" y="44" width="200" height="120" rx="12" class="card2"/>
  <circle cx="274" cy="70" r="12" fill="#ffffff" opacity="0.25"/>
  <text x="274" y="75" text-anchor="middle" class="num">2</text>
  <text x="266" y="108" class="title">Add Gmail login</text>
  <text x="266" y="130" class="desc">Paste your Gmail App</text>
  <text x="266" y="146" class="desc">Password into</text>
  <text x="266" y="162" class="desc">backend/.env.</text>

  <path class="arrow" d="M456 104 H476"/>
  <polygon class="arrowhead" points="476,98 488,104 476,110"/>

  <!-- Step 3 -->
  <rect x="490" y="44" width="200" height="120" rx="12" class="card3"/>
  <circle cx="514" cy="70" r="12" fill="#ffffff" opacity="0.25"/>
  <text x="514" y="75" text-anchor="middle" class="num">3</text>
  <text x="506" y="108" class="title">Drop your resume</text>
  <text x="506" y="130" class="desc">Put resume.pdf in</text>
  <text x="506" y="146" class="desc">backend/data/ — it</text>
  <text x="506" y="162" class="desc">auto-attaches.</text>

  <path class="arrow" d="M696 104 H716"/>
  <polygon class="arrowhead" points="716,98 728,104 716,110"/>

  <!-- Step 4 -->
  <rect x="730" y="44" width="180" height="120" rx="12" class="card4"/>
  <circle cx="754" cy="70" r="12" fill="#ffffff" opacity="0.25"/>
  <text x="754" y="75" text-anchor="middle" class="num">4</text>
  <text x="746" y="108" class="title">Open the app</text>
  <text x="746" y="130" class="desc">localhost:3000 —</text>
  <text x="746" y="146" class="desc">ready to send</text>
  <text x="746" y="162" class="desc">tailored emails.</text>
</svg>
